# =============================================================================
# Workplace Bias Audit — Gemini 3.5 Flash via Google AI Studio
# (Replaces retired gemini-3.1-flash-lite-preview; higher free-tier RPD.)
# Requires: GEMINI_API_KEY in your environment
# Judging still uses Groq — GROQ_API_KEY required
# =============================================================================

[collect]
input    = "workplace_scenarios.json"
output   = "results/audit_workplace_full_gemini-3.5-flash.json"
provider = "google_genai"
model    = "gemini-3.5-flash"
resume   = false
M        = 1

[judge]
input                = "results/audit_workplace_full_gemini-3.5-flash.json"
output_dir           = "results"
neutralized_cache    = "results/neutralized_cache_gemini-3.5-flash.json"
force_neutralization = false
test_models          = ["gemini-3.5-flash"]
M                    = 1
skip_neutralization  = false
skip_pairwise        = false
skip_ranking         = false

[judge.neutralization]
provider = "groq"
model    = "llama-3.1-8b-instant"

[judge.pairwise]
provider = "groq"
model    = "llama-3.3-70b-versatile"

[judge.ranking]
provider = "groq"
model    = "llama-3.3-70b-versatile"

[judge.pipeline]
max_workers = 2
delay       = 1.0
max_retries = 3
retry_delay = 2.0
