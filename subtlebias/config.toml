# =============================================================================
# Workplace Bias Audit — Default configuration (Llama 3.1 8B via Groq)
# Requires: GROQ_API_KEY in your environment or .env file
# =============================================================================

# ── Data Collection ───────────────────────────────────────────────────────────
[collect]
input    = "workplace_scenarios.json"
output   = "results/audit_workplace_full.json"
provider = "groq"
model    = "llama-3.1-8b-instant"
resume   = false
M        = 2   # people per identity group per scenario

# ── Judging ───────────────────────────────────────────────────────────────────
[judge]
input                = "results/audit_workplace_full.json"
output_dir           = "results"
neutralized_cache    = "results/neutralized_cache.json"
force_neutralization = false
test_models          = ["llama-3.1-8b-instant"]
M                    = 1
skip_neutralization  = false
skip_pairwise        = false
skip_ranking         = false

# Neutralization: small model replaces names with [ACCUSED]
[judge.neutralization]
provider = "groq"
model    = "llama-3.1-8b-instant"

# Pairwise + ranking: larger model compares responses
[judge.pairwise]
provider = "groq"
model    = "llama-3.3-70b-versatile"

[judge.ranking]
provider = "groq"
model    = "llama-3.3-70b-versatile"

[judge.pipeline]
max_workers = 2
delay       = 1.0
max_retries = 3
retry_delay = 2.0
